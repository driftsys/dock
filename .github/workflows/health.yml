name: Health check

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/driftsys/dock
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  packages: read

jobs:
  test:
    name: Test (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [core, rust, deno, node, python, polyglot, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "${{ env.REGISTRY }}:${{ matrix.image }}"

      - name: Run tests
        run: |
          BASH_UNIT_FLAGS="-f tap" REGISTRY=${{ env.REGISTRY }} \
            bash tests/run.sh ${{ matrix.image }} \
            | tee test-results.tap

      - name: Test report
        if: always()
        run: |
          {
            echo "## Test results — \`${{ matrix.image }}\`"
            echo ""
            echo "| # | Result | Test |"
            echo "|---|--------|------|"
            awk '/^ok /     { sub(/^ok /,"");     printf "| %s | :white_check_mark: | %s |\n", NR, $0 }
                 /^not ok / { sub(/^not ok /,""); printf "| %s | :x: | %s |\n", NR, $0 }' \
              test-results.tap
          } >> "$GITHUB_STEP_SUMMARY"
