name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dprint:
    name: Dprint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dprint/check@v2.3

  lint:
    name: Lint (hadolint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install hadolint
        run: |
          curl -sSfL \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
      - name: hadolint
        run: |
          files=$(find images -name 'Dockerfile*' 2>/dev/null)
          if [ -n "$files" ]; then
            echo "$files" | xargs hadolint
          else
            echo "No Dockerfiles found — skipping hadolint"
          fi
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: shellcheck
        run: |
          files=$(find scripts .githooks -name '*.sh' -o -name 'commit-msg' \
            -o -name 'pre-commit' 2>/dev/null)
          if [ -n "$files" ]; then
            echo "$files" | xargs shellcheck
          else
            echo "No shell scripts found — skipping shellcheck"
          fi
          shellcheck bootstrap

  convco:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install convco
        run: |
          curl -sSfL \
            https://github.com/convco/convco/releases/latest/download/convco-ubuntu.zip \
            -o /tmp/convco.zip
          unzip -o /tmp/convco.zip -d /usr/local/bin
          chmod +x /usr/local/bin/convco
      - name: Check commit messages
        run: |
          convco check \
            ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      any: ${{ steps.changes.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine affected images
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          # Null SHA on force-push or first push — treat everything as changed
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            changed="images/core/"
          else
            changed=$(git diff --name-only "$base" HEAD)
          fi

          # Dependency tree: core→everything, rust→polyglot, jvm→android
          # When a directory changes, both Alpine and Debian variants are tested.
          alpine=(core rust deno node python polyglot lint)
          debian=(core-debian rust-debian deno-debian node-debian python-debian polyglot-debian jvm-debian android-debian android-ndk-debian)
          all_images=("${alpine[@]}" "${debian[@]}")
          images=()

          add_unique() {
            local img="$1"
            if [[ ! " ${images[*]} " =~ " ${img} " ]]; then
              images+=("$img")
            fi
          }

          needs_all() {
            echo "$changed" | grep -qE '^(scripts/|docker-bake\.hcl|tests/)'
          }

          needs_core() {
            echo "$changed" | grep -qE '^images/core/'
          }

          needs_rust() {
            echo "$changed" | grep -qE '^images/rust/'
          }

          needs_jvm() {
            echo "$changed" | grep -qE '^images/jvm/'
          }

          if needs_all || needs_core; then
            images=("${all_images[@]}")
          else
            if needs_rust; then
              for img in rust polyglot rust-debian polyglot-debian; do
                add_unique "$img"
              done
            fi
            # jvm changes rebuild jvm-debian + android-debian + android-ndk-debian (dependency)
            if needs_jvm; then
              for img in jvm-debian android-debian android-ndk-debian; do
                add_unique "$img"
              done
            fi
            for img in deno node python lint; do
              if echo "$changed" | grep -qE "^images/${img}/"; then
                add_unique "$img"
                # Add Debian variant (lint has no Debian variant)
                if [ "$img" != "lint" ]; then
                  add_unique "${img}-debian"
                fi
              fi
            done
            # polyglot directory changes (without rust)
            if echo "$changed" | grep -qE "^images/polyglot/"; then
              add_unique "polyglot"
              add_unique "polyglot-debian"
            fi
            # android directory changes (without jvm)
            if echo "$changed" | grep -qE "^images/android/"; then
              add_unique "android-debian"
              add_unique "android-ndk-debian"
            fi
            # android-ndk directory changes
            if echo "$changed" | grep -qE "^images/android-ndk/"; then
              add_unique "android-ndk-debian"
            fi
          fi

          if [ ${#images[@]} -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${images[@]}" | jq -R . | jq -sc .)
            echo "matrix=${json}" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

  build-test:
    name: Build & test (${{ matrix.image }})
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build image
        uses: docker/bake-action@v6
        with:
          targets: ${{ matrix.image }}
          set: |
            *.platform=linux/amd64
            *.cache-from=
            *.cache-to=

      - name: Run tests
        run: |
          set -o pipefail
          BASH_UNIT_FLAGS="-f tap" REGISTRY=ghcr.io/driftsys/dock \
            bash tests/run.sh ${{ matrix.image }} \
            | tee test-results.tap

      - name: Test report
        if: always()
        run: |
          {
            echo "## Test results — \`${{ matrix.image }}\`"
            echo ""
            echo "| # | Result | Test |"
            echo "|---|--------|------|"
            awk '/^ok /     { sub(/^ok /,"");     printf "| %s | :white_check_mark: | %s |\n", NR, $0 }
                 /^not ok / { sub(/^not ok /,""); printf "| %s | :x: | %s |\n", NR, $0 }' \
              test-results.tap
          } >> "$GITHUB_STEP_SUMMARY"

  ci:
    name: CI
    if: always()
    needs: [dprint, lint, convco, build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              exit 1
            fi
          done
