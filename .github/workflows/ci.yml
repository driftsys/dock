name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dprint:
    name: Dprint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dprint/check@v2.3

  lint:
    name: Lint (hadolint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install hadolint
        run: |
          curl -sSfL \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
      - name: hadolint
        run: |
          curl -sSfL \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          files=$(find images -name 'Dockerfile*' 2>/dev/null)
          if [ -n "$files" ]; then
            echo "$files" | xargs hadolint
          else
            echo "No Dockerfiles found — skipping hadolint"
          fi
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: shellcheck
        run: |
          files=$(find scripts .githooks -name '*.sh' -o -name 'commit-msg' \
            -o -name 'pre-commit' 2>/dev/null)
          if [ -n "$files" ]; then
            echo "$files" | xargs shellcheck
          else
            echo "No shell scripts found — skipping shellcheck"
          fi
          shellcheck bootstrap

  convco:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install convco
        run: |
          curl -sSfL \
            https://github.com/convco/convco/releases/latest/download/convco-ubuntu.zip \
            -o /tmp/convco.zip
          unzip -o /tmp/convco.zip -d /usr/local/bin
          chmod +x /usr/local/bin/convco
      - name: Check commit messages
        run: |
          convco check \
            ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  ci:
    name: CI
    if: always()
    needs: [dprint, lint, convco]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              exit 1
            fi
          done
