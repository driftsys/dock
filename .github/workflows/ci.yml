name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dprint:
    name: Dprint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dprint/check@v2.3

  lint:
    name: Lint (hadolint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install hadolint
        run: |
          curl -sSfL \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
      - name: hadolint
        run: |
          curl -sSfL \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          files=$(find images -name 'Dockerfile*' 2>/dev/null)
          if [ -n "$files" ]; then
            echo "$files" | xargs hadolint
          else
            echo "No Dockerfiles found — skipping hadolint"
          fi
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: shellcheck
        run: |
          files=$(find scripts .githooks -name '*.sh' -o -name 'commit-msg' \
            -o -name 'pre-commit' 2>/dev/null)
          if [ -n "$files" ]; then
            echo "$files" | xargs shellcheck
          else
            echo "No shell scripts found — skipping shellcheck"
          fi
          shellcheck bootstrap

  convco:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install convco
        run: |
          curl -sSfL \
            https://github.com/convco/convco/releases/latest/download/convco-ubuntu.zip \
            -o /tmp/convco.zip
          unzip -o /tmp/convco.zip -d /usr/local/bin
          chmod +x /usr/local/bin/convco
      - name: Check commit messages
        run: |
          convco check \
            ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      any: ${{ steps.changes.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine affected images
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          changed=$(git diff --name-only "$base" HEAD)

          # Dependency tree: core→everything, rust→polyglot
          all_images=(core rust deno node python polyglot lint)
          images=()

          needs_all() {
            echo "$changed" | grep -qE '^(scripts/|docker-bake\.hcl|tests/)'
          }

          needs_core() {
            echo "$changed" | grep -qE '^images/core/'
          }

          needs_rust() {
            echo "$changed" | grep -qE '^images/rust/'
          }

          if needs_all || needs_core; then
            images=("${all_images[@]}")
          else
            if needs_rust; then
              images+=(rust polyglot)
            fi
            for img in deno node python lint polyglot; do
              if echo "$changed" | grep -qE "^images/${img}/"; then
                # avoid duplicates
                if [[ ! " ${images[*]} " =~ " ${img} " ]]; then
                  images+=("$img")
                fi
              fi
            done
          fi

          if [ ${#images[@]} -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${images[@]}" | jq -R . | jq -sc .)
            echo "matrix=${json}" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

  build-test:
    name: Build & test (${{ matrix.image }})
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build image
        uses: docker/bake-action@v6
        with:
          targets: ${{ matrix.image }}
          set: |
            *.platform=linux/amd64
            *.cache-from=
            *.cache-to=

      - name: Run tests
        run: |
          set -o pipefail
          BASH_UNIT_FLAGS="-f tap" REGISTRY=ghcr.io/driftsys/dock \
            bash tests/run.sh ${{ matrix.image }} \
            | tee test-results.tap

      - name: Test report
        if: always()
        run: |
          {
            echo "## Test results — \`${{ matrix.image }}\`"
            echo ""
            echo "| # | Result | Test |"
            echo "|---|--------|------|"
            awk '/^ok /     { sub(/^ok /,"");     printf "| %s | :white_check_mark: | %s |\n", NR, $0 }
                 /^not ok / { sub(/^not ok /,""); printf "| %s | :x: | %s |\n", NR, $0 }' \
              test-results.tap
          } >> "$GITHUB_STEP_SUMMARY"

  ci:
    name: CI
    if: always()
    needs: [dprint, lint, convco, build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              exit 1
            fi
          done
